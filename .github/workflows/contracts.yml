name: Contracts

on:
  pull_request:
    paths:
      - "contracts/**"
      - "brain/api/protocol/**"
      - "brain/api/tests/contracts/**"
      - ".github/workflows/contracts.yml"
  push:
    branches:
      - main
      - master

jobs:
  protocol-contracts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check generated contracts are up to date
        run: python3 contracts/scripts/generate_protocol_contracts.py --check

      - name: Install backend test dependencies
        run: python3 -m pip install pytest "pydantic>=2.0.0,<3"

      - name: Run backend protocol tests
        run: python3 -m pytest brain/api/tests/contracts/test_protocol_events.py -v
