server {
    listen 80;
    server_name _;

    # ── Admin frontend ───────────────────────────────────────
    location = /admin {
        return 301 $scheme://$http_host/admin/;
    }
    location /admin/ {
        proxy_pass http://admin:5173;
        include /etc/nginx/proxy-params.conf;
        include /etc/nginx/websocket.conf;
    }

    # ── Brain API ────────────────────────────────────────────
    location /api/ {
        proxy_pass http://api:8100;
        include /etc/nginx/proxy-params.conf;
        include /etc/nginx/websocket.conf;
    }

    # ── Backend (optional; returns 502 when service is down) ─
    # Uses Docker DNS resolver so nginx starts even if backend
    # container is absent.
    location /tts/ {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:8200;
        proxy_pass $backend$request_uri;
        include /etc/nginx/proxy-params.conf;
    }

    location /upload {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:8200;
        proxy_pass $backend$request_uri;
        include /etc/nginx/proxy-params.conf;
        client_max_body_size 100m;
    }

    location /health {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:8200;
        proxy_pass $backend$request_uri;
        include /etc/nginx/proxy-params.conf;
    }
}
