server {
    listen 80;
    listen 443 ssl;
    server_name _;
    ssl_certificate /etc/nginx/certs/openvman.crt;
    ssl_certificate_key /etc/nginx/certs/openvman.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:OPENVMAN_SSL:10m;
    ssl_session_timeout 1d;

    # ‚îÄ‚îÄ Admin backend endpoints ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
    location /admin/dlq {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:8200;
        proxy_pass $backend$request_uri;
        include /etc/nginx/http.d/proxy-params.conf;
    }

    # ‚îÄ‚îÄ Admin frontend ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
    location = /admin {
        return 301 $scheme://$http_host/admin/;
    }
    location /admin/ {
        proxy_pass http://localhost:5173;
        include /etc/nginx/http.d/proxy-params.conf;
        include /etc/nginx/http.d/websocket.conf;
    }

    # ‚îÄ‚îÄ Backend API (v1 + docs) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
    location /v1/ {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:8200;
        proxy_pass $backend$request_uri;
        include /etc/nginx/http.d/proxy-params.conf;
    }

    location /documents/ {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:8200;
        proxy_pass $backend$request_uri;
        include /etc/nginx/http.d/proxy-params.conf;
        client_max_body_size 100m;
    }

    location /uploads {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:8200;
        proxy_pass $backend$request_uri;
        include /etc/nginx/http.d/proxy-params.conf;
        client_max_body_size 100m;
    }

    location /jobs/ {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:8200;
        proxy_pass $backend$request_uri;
        include /etc/nginx/http.d/proxy-params.conf;
    }

    # ‚îÄ‚îÄ Public embed static entry + loader ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
    location = /embed/avatar {
        alias /srv/openvman/embed/avatar.html;
    }

    location /embed/ {
        alias /srv/openvman/embed/;
        try_files $uri =404;
    }

    location = /vman-embed.js {
        alias /srv/openvman/embed-loader/vman-embed.js;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # ‚îÄ‚îÄ Public embed backend API ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
    # CORS for protected embed APIs is set by backend after API key + domain
    # allowlist validation; nginx must not reflect arbitrary Origin values here.
    location /api/embed/ {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:8200;
        proxy_pass $backend$request_uri;
        include /etc/nginx/http.d/proxy-params.conf;
        proxy_buffering off;
        proxy_cache off;
        client_max_body_size 100m;
    }

    location /ws/embed/ {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:8200;
        proxy_pass $backend$request_uri;
        include /etc/nginx/http.d/proxy-params.conf;
        include /etc/nginx/http.d/websocket.conf;
        proxy_buffering off;
        proxy_cache off;
    }

    # ‚îÄ‚îÄ Brain API (proxied via backend) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:8200;
        proxy_pass $backend$request_uri;
        include /etc/nginx/http.d/proxy-params.conf;
        include /etc/nginx/http.d/websocket.conf;
        proxy_redirect ~^https?://[^/]+/(.*) $scheme://$http_host/$1;
        proxy_buffering off;
        proxy_cache off;
        client_max_body_size 100m;
    }

    location /ws/ {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:8200;
        proxy_pass $backend$request_uri;
        include /etc/nginx/http.d/proxy-params.conf;
        include /etc/nginx/http.d/websocket.conf;
        proxy_buffering off;
        proxy_cache off;
    }

    # ‚îÄ‚îÄ Brain Swagger UI (direct to brain service) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
    location /brain/ {
        resolver 127.0.0.11 valid=30s;
        set $brain http://api:8100;
        proxy_pass $brain$request_uri;
        proxy_redirect ~^https?://[^/]+/(.*) $scheme://$http_host/$1;
        include /etc/nginx/http.d/proxy-params.conf;
    }

    # ‚îÄ‚îÄ Docs & OpenAPI ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
    location /docs {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:8200;
        proxy_pass $backend$request_uri;
        proxy_redirect ~^https?://[^/]+/(.*) $scheme://$http_host/$1;
        include /etc/nginx/http.d/proxy-params.conf;
    }

    location /openapi.json {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:8200;
        proxy_pass $backend$request_uri;
        include /etc/nginx/http.d/proxy-params.conf;
    }

    # ‚îÄ‚îÄ TTS streaming (direct to IndexTTS for low-latency WAV stream) ‚îÄ‚îÄ
    # Must be declared BEFORE the generic /tts/ prefix ‚Äî nginx picks the
    # longest prefix match, so this wins for /tts/stream requests.
    # proxy_buffering MUST be off, otherwise nginx accumulates the full
    # response before forwarding, which defeats streaming playback.
    location /tts/stream {
        resolver 127.0.0.11 valid=30s;
        # ÊåáÂêë backendÔºåÁî±ÂÖ∂ÂÅö IndexTTS ‚Üí Edge streaming ‚Üí buffered ÁöÑ fallback„ÄÇ
        # ‰∏çÂèØÁõ¥ÈÄÅ index-tts-vllmÔºåÂê¶Ââá IndexTTS ÊéõÊéâÂ∞±Áõ¥Êé• 502ÔºåÁπûÈÅé fallback„ÄÇ
        set $backend http://backend:8200;
        proxy_pass $backend$request_uri;
        include /etc/nginx/http.d/proxy-params.conf;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_request_buffering off;
        client_max_body_size 1m;
    }

    # ‚îÄ‚îÄ TTS ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
    location /tts/ {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:8200;
        proxy_pass $backend$request_uri;
        include /etc/nginx/http.d/proxy-params.conf;
    }

    # ‚îÄ‚îÄ Grafana (monitoring dashboard) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
    location /grafana/ {
        resolver 127.0.0.11 valid=30s;
        set $grafana http://grafana:3000;
        proxy_pass $grafana$request_uri;
        include /etc/nginx/http.d/proxy-params.conf;
        include /etc/nginx/http.d/websocket.conf;
        proxy_redirect ~^https?://[^/]+/(.*) $scheme://$http_host/$1;
        proxy_buffering off;
    }
    # ‚îÄ‚îÄ Avatar character assets (served by backend volume) ‚îÄ‚îÄ
    location /assets/ {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:8200;
        proxy_pass $backend$request_uri;
        include /etc/nginx/http.d/proxy-params.conf;
        client_max_body_size 200m;
    }
    # ‚îÄ‚îÄ Avatar background assets (served by backend volume) ‚îÄ‚îÄ
    location /backgrounds/ {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:8200;
        proxy_pass $backend$request_uri;
        include /etc/nginx/http.d/proxy-params.conf;
        client_max_body_size 50m;
    }
    # ‚îÄ‚îÄ Avatar frontend (virtual human) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
    location / {
        resolver 127.0.0.11 valid=30s;
        set $avatar http://avatar:80;
        proxy_pass $avatar$request_uri;
        include /etc/nginx/http.d/proxy-params.conf;
        include /etc/nginx/http.d/websocket.conf;
    }
}
