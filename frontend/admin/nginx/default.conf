server {
    listen 80;
    server_name _;

    # ── Admin backend endpoints ───────────────────────────
    location /admin/dlq {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:8200;
        proxy_pass $backend$request_uri;
        include /etc/nginx/http.d/proxy-params.conf;
    }

    # ── Admin frontend ───────────────────────────────────────
    location = /admin {
        return 301 $scheme://$http_host/admin/;
    }
    location /admin/ {
        proxy_pass http://localhost:5173;
        include /etc/nginx/http.d/proxy-params.conf;
        include /etc/nginx/http.d/websocket.conf;
    }

    # ── Backend API (v1 + docs) ─────────────────────────────
    location /v1/ {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:8200;
        proxy_pass $backend$request_uri;
        include /etc/nginx/http.d/proxy-params.conf;
    }

    location /documents/ {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:8200;
        proxy_pass $backend$request_uri;
        include /etc/nginx/http.d/proxy-params.conf;
        client_max_body_size 100m;
    }

    location /uploads {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:8200;
        proxy_pass $backend$request_uri;
        include /etc/nginx/http.d/proxy-params.conf;
        client_max_body_size 100m;
    }

    location /jobs/ {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:8200;
        proxy_pass $backend$request_uri;
        include /etc/nginx/http.d/proxy-params.conf;
    }

    # ── Brain API (proxied via backend) ──────────────────────
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:8200;
        proxy_pass $backend$request_uri;
        include /etc/nginx/http.d/proxy-params.conf;
        include /etc/nginx/http.d/websocket.conf;
        proxy_redirect ~^https?://[^/]+/(.*) $scheme://$http_host/$1;
        proxy_buffering off;
        proxy_cache off;
        client_max_body_size 100m;
    }

    location /ws/ {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:8200;
        proxy_pass $backend$request_uri;
        include /etc/nginx/http.d/proxy-params.conf;
        include /etc/nginx/http.d/websocket.conf;
        proxy_buffering off;
        proxy_cache off;
    }

    # ── Brain Swagger UI (direct to brain service) ──────────
    location /brain/ {
        resolver 127.0.0.11 valid=30s;
        set $brain http://api:8100;
        proxy_pass $brain$request_uri;
        proxy_redirect ~^https?://[^/]+/(.*) $scheme://$http_host/$1;
        include /etc/nginx/http.d/proxy-params.conf;
    }

    # ── Docs & OpenAPI ───────────────────────────────────────
    location /docs {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:8200;
        proxy_pass $backend$request_uri;
        proxy_redirect ~^https?://[^/]+/(.*) $scheme://$http_host/$1;
        include /etc/nginx/http.d/proxy-params.conf;
    }

    location /openapi.json {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:8200;
        proxy_pass $backend$request_uri;
        include /etc/nginx/http.d/proxy-params.conf;
    }

    # ── TTS streaming (direct to IndexTTS for low-latency WAV stream) ──
    # Must be declared BEFORE the generic /tts/ prefix — nginx picks the
    # longest prefix match, so this wins for /tts/stream requests.
    # proxy_buffering MUST be off, otherwise nginx accumulates the full
    # response before forwarding, which defeats streaming playback.
    location /tts/stream {
        resolver 127.0.0.11 valid=30s;
        set $tts http://index-tts-vllm:8011;
        proxy_pass $tts/tts_stream;
        include /etc/nginx/http.d/proxy-params.conf;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_request_buffering off;
        client_max_body_size 1m;
    }

    # ── TTS ──────────────────────────────────────────────────
    location /tts/ {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:8200;
        proxy_pass $backend$request_uri;
        include /etc/nginx/http.d/proxy-params.conf;
    }

    # ── Grafana (monitoring dashboard) ──────────────────────
    location /grafana/ {
        resolver 127.0.0.11 valid=30s;
        set $grafana http://grafana:3000;
        proxy_pass $grafana$request_uri;
        include /etc/nginx/http.d/proxy-params.conf;
        include /etc/nginx/http.d/websocket.conf;
        proxy_redirect ~^https?://[^/]+/(.*) $scheme://$http_host/$1;
        proxy_buffering off;
    }
    # ── Avatar frontend (virtual human) ────────────────────
    location / {
        resolver 127.0.0.11 valid=30s;
        set $avatar http://avatar:80;
        proxy_pass $avatar$request_uri;
        include /etc/nginx/http.d/proxy-params.conf;
        include /etc/nginx/http.d/websocket.conf;
    }
}
