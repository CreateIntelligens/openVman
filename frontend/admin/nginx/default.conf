server {
    listen 80;
    server_name _;

    # ── Admin backend endpoints ───────────────────────────
    location /admin/dlq {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:8200;
        proxy_pass $backend$request_uri;
        include /etc/nginx/http.d/proxy-params.conf;
    }

    # ── Admin frontend ───────────────────────────────────────
    location = /admin {
        return 301 $scheme://$http_host/admin/;
    }
    location /admin/ {
        proxy_pass http://localhost:5173;
        include /etc/nginx/http.d/proxy-params.conf;
        include /etc/nginx/http.d/websocket.conf;
    }

    # ── Backend API (v1 + docs) ─────────────────────────────
    location /v1/ {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:8200;
        proxy_pass $backend$request_uri;
        include /etc/nginx/http.d/proxy-params.conf;
    }

    location /documents/ {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:8200;
        proxy_pass $backend$request_uri;
        include /etc/nginx/http.d/proxy-params.conf;
        client_max_body_size 100m;
    }

    location /uploads {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:8200;
        proxy_pass $backend$request_uri;
        include /etc/nginx/http.d/proxy-params.conf;
        client_max_body_size 100m;
    }

    location /jobs/ {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:8200;
        proxy_pass $backend$request_uri;
        include /etc/nginx/http.d/proxy-params.conf;
    }

    # ── Brain API (proxied via backend) ──────────────────────
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:8200;
        proxy_pass $backend$request_uri;
        include /etc/nginx/http.d/proxy-params.conf;
        include /etc/nginx/http.d/websocket.conf;
        proxy_redirect ~^https?://[^/]+/(.*) $scheme://$http_host/$1;
        proxy_buffering off;
        proxy_cache off;
        client_max_body_size 100m;
    }

    # ── Brain Swagger UI (direct to brain service) ──────────
    location /brain/ {
        resolver 127.0.0.11 valid=30s;
        set $brain http://api:8100;
        proxy_pass $brain$request_uri;
        proxy_redirect ~^https?://[^/]+/(.*) $scheme://$http_host/$1;
        include /etc/nginx/http.d/proxy-params.conf;
    }

    # ── Docs & OpenAPI ───────────────────────────────────────
    location /docs {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:8200;
        proxy_pass $backend$request_uri;
        proxy_redirect ~^https?://[^/]+/(.*) $scheme://$http_host/$1;
        include /etc/nginx/http.d/proxy-params.conf;
    }

    location /openapi.json {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:8200;
        proxy_pass $backend$request_uri;
        include /etc/nginx/http.d/proxy-params.conf;
    }

    # ── TTS ──────────────────────────────────────────────────
    location /tts/ {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:8200;
        proxy_pass $backend$request_uri;
        include /etc/nginx/http.d/proxy-params.conf;
    }
}
