# Production nginx config for the admin runner image.
# Serves the pre-built static admin bundle only — cross-service
# routing (backend, brain, tts, grafana, avatar, embed) stays with
# the existing edge proxy, not this container.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    # Self-hosted Whisper model assets and VAD assets are part of the
    # built bundle under /admin/ and served as plain static files.
    location = /admin {
        return 301 $scheme://$http_host/admin/;
    }

    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    # Hashed JS/CSS/wasm assets are immutable — cache aggressively.
    location /admin/assets/ {
        alias /usr/share/nginx/html/admin/assets/;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
