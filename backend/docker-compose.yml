services:
  backend:
    build: .
    restart: unless-stopped
    depends_on:
      - redis
    volumes:
      - ./app:/app/app
    environment:
      UVICORN_RELOAD: "${UVICORN_RELOAD:-1}"
      MARKITDOWN_MAX_UPLOAD_BYTES: "${MARKITDOWN_MAX_UPLOAD_BYTES:-10485760}"
      # --- Edge-TTS (in-process, enabled by default) ---
      TTS_EDGE_ENABLED: "${TTS_EDGE_ENABLED:-true}"
      TTS_EDGE_VOICE: "${TTS_EDGE_VOICE:-zh-TW-HsiaoChenNeural}"
      TTS_EDGE_SAMPLE_RATE: "${TTS_EDGE_SAMPLE_RATE:-24000}"
      TTS_EDGE_MAX_TEXT_LENGTH: "${TTS_EDGE_MAX_TEXT_LENGTH:-2000}"
      # --- AWS Polly (optional) ---
      TTS_AWS_ENABLED: "${TTS_AWS_ENABLED:-false}"
      TTS_AWS_REGION: "${TTS_AWS_REGION:-ap-northeast-1}"
      TTS_AWS_ACCESS_KEY_ID: "${TTS_AWS_ACCESS_KEY_ID:-}"
      TTS_AWS_SECRET_ACCESS_KEY: "${TTS_AWS_SECRET_ACCESS_KEY:-}"
      TTS_AWS_POLLY_VOICE_ID: "${TTS_AWS_POLLY_VOICE_ID:-Zhiyu}"
      TTS_AWS_POLLY_ENGINE: "${TTS_AWS_POLLY_ENGINE:-neural}"
      TTS_AWS_OUTPUT_FORMAT: "${TTS_AWS_OUTPUT_FORMAT:-pcm}"
      TTS_AWS_SAMPLE_RATE: "${TTS_AWS_SAMPLE_RATE:-24000}"
      # --- GCP Cloud TTS (optional) ---
      TTS_GCP_ENABLED: "${TTS_GCP_ENABLED:-false}"
      TTS_GCP_PROJECT_ID: "${TTS_GCP_PROJECT_ID:-}"
      TTS_GCP_CREDENTIALS_JSON: "${TTS_GCP_CREDENTIALS_JSON:-}"
      TTS_GCP_VOICE_NAME: "${TTS_GCP_VOICE_NAME:-cmn-TW-Standard-A}"
      TTS_GCP_AUDIO_ENCODING: "${TTS_GCP_AUDIO_ENCODING:-LINEAR16}"
      TTS_GCP_SAMPLE_RATE: "${TTS_GCP_SAMPLE_RATE:-24000}"
      # --- Gateway ---
      REDIS_URL: "${REDIS_URL:-redis://redis:6379}"
      GATEWAY_TEMP_DIR: "${GATEWAY_TEMP_DIR:-/tmp/vman-gateway}"
      GATEWAY_TEMP_TTL_MIN: "${GATEWAY_TEMP_TTL_MIN:-30}"
      GATEWAY_TEMP_DIR_MAX_MB: "${GATEWAY_TEMP_DIR_MAX_MB:-2048}"
      GATEWAY_MAX_FILE_SIZE_MB: "${GATEWAY_MAX_FILE_SIZE_MB:-100}"
      MEDIA_PROCESSING_TIMEOUT_MS: "${MEDIA_PROCESSING_TIMEOUT_MS:-5000}"
      QUEUE_JOB_TIMEOUT_MS: "${QUEUE_JOB_TIMEOUT_MS:-30000}"
      # --- Vision LLM ---
      VISION_LLM_API_KEY: "${VISION_LLM_API_KEY:-}"
      VISION_LLM_MODEL: "${VISION_LLM_MODEL:-gpt-4o}"
      VISION_LLM_BASE_URL: "${VISION_LLM_BASE_URL:-}"
      # --- Whisper ---
      WHISPER_PROVIDER: "${WHISPER_PROVIDER:-openai}"
      WHISPER_API_KEY: "${WHISPER_API_KEY:-}"
      WHISPER_LOCAL_BIN: "${WHISPER_LOCAL_BIN:-/usr/local/bin/whisper}"
      # --- Camera ---
      CAMERA_SNAPSHOT_INTERVAL_SEC: "${CAMERA_SNAPSHOT_INTERVAL_SEC:-5}"
      # --- API Tool ---
      API_TOOL_TIMEOUT_MS: "${API_TOOL_TIMEOUT_MS:-10000}"
      API_TOOL_MAX_QUEUE: "${API_TOOL_MAX_QUEUE:-10}"
      API_REGISTRY_PATH: "${API_REGISTRY_PATH:-./config/api-registry.yaml}"
      # --- Web Crawler ---
      CRAWLER_TIMEOUT_MS: "${CRAWLER_TIMEOUT_MS:-15000}"
      CRAWLER_CACHE_TTL_MIN: "${CRAWLER_CACHE_TTL_MIN:-60}"
      CRAWLER_IGNORE_ROBOTS: "${CRAWLER_IGNORE_ROBOTS:-false}"
      CRAWLER_BLOCKED_DOMAINS: "${CRAWLER_BLOCKED_DOMAINS:-}"
      # --- Internal ---
      BRAIN_URL: "${BRAIN_URL:-http://brain:8100}"
    ports:
      - "${BACKEND_PORT:-8200}:8200"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

volumes:
  redis-data:
