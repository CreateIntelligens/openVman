services:
  tts-router:
    build: ./tts_router
    restart: unless-stopped
    volumes:
      - ./tts_router/app:/app/app
    environment:
      UVICORN_RELOAD: "${UVICORN_RELOAD:-1}"
      MARKITDOWN_MAX_UPLOAD_BYTES: "${MARKITDOWN_MAX_UPLOAD_BYTES:-10485760}"
      # --- Edge-TTS (in-process, enabled by default) ---
      TTS_EDGE_ENABLED: "${TTS_EDGE_ENABLED:-true}"
      TTS_EDGE_VOICE: "${TTS_EDGE_VOICE:-zh-TW-HsiaoChenNeural}"
      TTS_EDGE_SAMPLE_RATE: "${TTS_EDGE_SAMPLE_RATE:-24000}"
      TTS_EDGE_MAX_TEXT_LENGTH: "${TTS_EDGE_MAX_TEXT_LENGTH:-2000}"
      # --- AWS Polly (optional) ---
      TTS_AWS_ENABLED: "${TTS_AWS_ENABLED:-false}"
      TTS_AWS_REGION: "${TTS_AWS_REGION:-ap-northeast-1}"
      TTS_AWS_ACCESS_KEY_ID: "${TTS_AWS_ACCESS_KEY_ID:-}"
      TTS_AWS_SECRET_ACCESS_KEY: "${TTS_AWS_SECRET_ACCESS_KEY:-}"
      TTS_AWS_POLLY_VOICE_ID: "${TTS_AWS_POLLY_VOICE_ID:-Zhiyu}"
      TTS_AWS_POLLY_ENGINE: "${TTS_AWS_POLLY_ENGINE:-neural}"
      TTS_AWS_OUTPUT_FORMAT: "${TTS_AWS_OUTPUT_FORMAT:-pcm}"
      TTS_AWS_SAMPLE_RATE: "${TTS_AWS_SAMPLE_RATE:-24000}"
      # --- GCP Cloud TTS (optional) ---
      TTS_GCP_ENABLED: "${TTS_GCP_ENABLED:-false}"
      TTS_GCP_PROJECT_ID: "${TTS_GCP_PROJECT_ID:-}"
      TTS_GCP_CREDENTIALS_JSON: "${TTS_GCP_CREDENTIALS_JSON:-}"
      TTS_GCP_VOICE_NAME: "${TTS_GCP_VOICE_NAME:-cmn-TW-Standard-A}"
      TTS_GCP_AUDIO_ENCODING: "${TTS_GCP_AUDIO_ENCODING:-LINEAR16}"
      TTS_GCP_SAMPLE_RATE: "${TTS_GCP_SAMPLE_RATE:-24000}"
    ports:
      - "${TTS_ROUTER_PORT:-8200}:8200"
