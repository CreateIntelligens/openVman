services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./.env
    ports:
      - "${BACKEND_PORT:-8200}:8200"
    volumes:
      - ./app:/app/app
      - ./index-tts-vllm:/app/index-tts-vllm
      - ./logs:/app/logs
      - hf-cache:/root/.cache/huggingface
      - modelscope-cache:/root/.cache/modelscope
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  hf-cache:
  modelscope-cache:
