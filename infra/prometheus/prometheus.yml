global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: backend
    static_configs:
      - targets: ["backend:8200"]
    metrics_path: /metrics/prometheus

  - job_name: brain
    static_configs:
      - targets: ["api:8100"]
    metrics_path: /brain/metrics/prometheus
