server {
    listen 80;
    server_name _;

    # Admin 前端
    location / {
        proxy_pass http://admin:5173;
        include /etc/nginx/proxy-params.conf;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Brain API
    location /api/ {
        proxy_pass http://api:8100;
        include /etc/nginx/proxy-params.conf;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # TTS Router（可選，service 不存在時回 502）
    location /tts/ {
        resolver 127.0.0.11 valid=30s;
        set $tts_upstream http://tts-router:8200;
        proxy_pass $tts_upstream$request_uri;
        include /etc/nginx/proxy-params.conf;
    }
}
