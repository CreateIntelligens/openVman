server {
    listen 80;
    server_name _;

    # Admin 前端
    location = /admin {
        return 301 $scheme://$http_host/admin/;
    }
    location /admin/ {
        proxy_pass http://admin:5173/admin/;
        include /etc/nginx/proxy-params.conf;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Brain API
    location /api/ {
        proxy_pass http://api:8100;
        include /etc/nginx/proxy-params.conf;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Backend — TTS routes（可選，service 不存在時回 502）
    location /tts/ {
        resolver 127.0.0.11 valid=30s;
        set $backend_upstream http://backend:8200;
        proxy_pass $backend_upstream$request_uri;
        include /etc/nginx/proxy-params.conf;
    }

    # Backend — Gateway upload
    location /upload {
        resolver 127.0.0.11 valid=30s;
        set $backend_upstream http://backend:8200;
        proxy_pass $backend_upstream$request_uri;
        include /etc/nginx/proxy-params.conf;
        client_max_body_size 100m;
    }

    # Backend — Gateway health
    location /health {
        resolver 127.0.0.11 valid=30s;
        set $backend_upstream http://backend:8200;
        proxy_pass $backend_upstream$request_uri;
        include /etc/nginx/proxy-params.conf;
    }
}
