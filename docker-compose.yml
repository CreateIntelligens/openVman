x-shared: &shared
  environment: &tz
    - TZ=Asia/Taipei
  restart: unless-stopped

services:
  api:
    <<: *shared
    user: "${UID:-1000}:${GID:-1000}"
    build:
      context: ./brain/api
      dockerfile: Dockerfile
    volumes:
      - ./brain/api:/app
      - ./brain/data:/data
      - ./brain/skills:/skills
      - ./contracts:/contracts:ro
      - brain-data:/home/appuser/.openclaw/lancedb
      - hf-cache:/home/appuser/.cache/huggingface
    env_file:
      - ./brain/.env
    environment:
      - HOME=/home/appuser
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  vibevoice-serve:
    <<: *shared
    build:
      context: ./backend/vibevoice-serve
      dockerfile: Dockerfile
    environment:
      - VIBEVOICE_MODEL_PATH=${VIBEVOICE_MODEL_PATH:-microsoft/VibeVoice-1.5B}
      - VIBEVOICE_DEFAULT_SPEAKER=${VIBEVOICE_DEFAULT_SPEAKER:-}
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - ./backend/vibevoice-serve/app:/app
      - ./backend/app/assets/tts_references:/app/assets/tts_references:ro
      - hf-cache:/root/.cache/huggingface
    ports:
      - "3000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, json, sys; res=json.loads(urllib.request.urlopen('http://localhost:3000/health').read()); sys.exit(0 if res.get('status') == 'ok' else 1)"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  admin:
    <<: *shared
    build:
      context: ./frontend/admin
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8787}:80"
    volumes:
      - ./frontend/admin:/app
      - admin-node-modules:/app/node_modules
      - ./frontend/admin/nginx:/etc/nginx/http.d
      - ./contracts:/contracts:ro
    depends_on:
      - api
      - backend
      - vibevoice-serve

  redis:
    <<: *shared
    image: redis:7-alpine
    volumes:
      - redis-data:/data

  backend:
    <<: *shared
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend/app:/app/app
      - ./backend/logs:/app/logs
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - TTS_VIBEVOICE_URL=http://vibevoice-serve:3000
    depends_on:
      api:
        condition: service_started
      vibevoice-serve:
        condition: service_healthy

volumes:
  brain-data:
  hf-cache:
  modelscope-cache:
  admin-node-modules:
  redis-data:
