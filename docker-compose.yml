x-shared: &shared
  environment: &tz
    - TZ=Asia/Taipei
  restart: unless-stopped

services:
  api:
    <<: *shared
    build:
      context: ./brain/api
      dockerfile: Dockerfile
    volumes:
      - ./brain/api:/app
      - ./brain/data:/data
      - ./contracts:/contracts:ro
      - brain-data:/root/.openclaw/lancedb
      - hf-cache:/root/.cache/huggingface
    env_file:
      - ./brain/.env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  admin:
    <<: *shared
    build:
      context: ./frontend/admin
      dockerfile: Dockerfile
    volumes:
      - ./frontend/admin:/app
      - /app/node_modules
      - ./contracts:/contracts:ro

  nginx:
    <<: *shared
    image: nginx:alpine
    ports:
      - "${PORT:-8787}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/proxy-params.conf:/etc/nginx/proxy-params.conf:ro
    depends_on:
      - api
      - admin

volumes:
  brain-data:
  hf-cache:
