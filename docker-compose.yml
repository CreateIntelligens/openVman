  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]

  admin:
    <<: *shared
    build:
      context: ./frontend/admin
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8787}:80"
    volumes:
      - ./frontend/admin:/app
      - admin-node-modules:/app/node_modules
      - ./frontend/admin/nginx:/etc/nginx/http.d
      - ./contracts:/contracts:ro
    depends_on:
      - api
      - backend
      - index-tts-vllm

  redis:
    <<: *shared
    image: redis:7-alpine
    volumes:
      - redis-data:/data

  backend:
    <<: *shared
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend/app:/app/app
      - ./backend/logs:/app/logs
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - TTS_INDEXTTS_URL=http://index-tts-vllm:8011
      # - TTS_VIBEVOICE_URL=http://vibevoice-serve:3000  # 封存
    depends_on:
      api:
        condition: service_started
      index-tts-vllm:
        condition: service_healthy

volumes:
  hf-cache:
  admin-node-modules:
  redis-data:
