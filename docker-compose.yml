x-shared: &shared
  environment: &tz
    - TZ=Asia/Taipei
  restart: unless-stopped

services:
  api:
    <<: *shared
    user: "${UID:-1000}:${GID:-1000}"
    build:
      context: ./brain/api
      dockerfile: Dockerfile
    volumes:
      - ./brain/api:/app
      - ./brain/data:/data
      - ./brain/skills:/skills
      - ./contracts:/contracts:ro
      - hf-cache:/home/appuser/.cache/huggingface
      - opf-cache:/home/appuser/.opf
      - triton-cache:/home/appuser/.triton
    env_file:
      - ./brain/.env
    environment:
      - HOME=/home/appuser
      - OPF_MOE_TRITON=false
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  index-tts-vllm:
    <<: *shared
    build:
      context: ./backend/index-tts-vllm
      dockerfile: Dockerfile
    environment:
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:512
      - CUDA_LAUNCH_BLOCKING=1
      - TORCH_CUDA_ARCH_LIST=${TORCH_CUDA_ARCH_LIST:-8.9}
      - MODEL=${INDEXTTS_MODEL:-IndexTeam/IndexTTS-1.5}
      - VLLM_USE_MODELSCOPE=${INDEXTTS_USE_MODELSCOPE:-1}
      - DOWNLOAD_MODEL=${INDEXTTS_DOWNLOAD_MODEL:-1}
      - CONVERT_MODEL=${INDEXTTS_CONVERT_MODEL:-1}
      - MODEL_DIR=assets/checkpoints
      - PORT=8011
      - GPU_MEMORY_UTILIZATION=${INDEXTTS_GPU_MEM:-0.1}
    volumes:
      - ./backend/index-tts-vllm:/app
      - ./backend/app/assets/tts_references:/app/assets/tts_references:ro
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request, json, sys; res=json.loads(urllib.request.urlopen('http://localhost:8011/health').read()); sys.exit(0 if res.get('status') == 'healthy' else 1)"]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  vlm:
    <<: *shared
    profiles: ["vlm"]
    image: ${VLM_IMAGE:-vllm/vllm-openai:v0.11.0}
    command:
      - --model
      - ${VLM_MODEL:-Qwen/Qwen3-VL-4B-Instruct-FP8}
      - --served-model-name
      - ${VLM_SERVED_MODEL:-openvman-vlm}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --max-model-len
      - ${VLM_MAX_MODEL_LEN:-1024}
      - --max-num-seqs
      - ${VLM_MAX_NUM_SEQS:-1}
      - --max-num-batched-tokens
      - ${VLM_MAX_NUM_BATCHED_TOKENS:-512}
      - --gpu-memory-utilization
      - ${VLM_GPU_MEMORY_UTILIZATION:-0.62}
      - --enforce-eager
      - --limit-mm-per-prompt
      - '{"image":1}'
      - --mm-processor-kwargs
      - '{"max_pixels":262144}'
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HOME=/root/.cache/huggingface
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    volumes:
      - hf-cache:/root/.cache/huggingface
    shm_size: 8g
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request, sys; urllib.request.urlopen('http://localhost:8000/v1/models', timeout=2).read(); sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 30
      start_period: 180s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  avatar:
    <<: *shared
    build:
      context: ./frontend/app
      dockerfile: Dockerfile
    volumes:
      - ./frontend/app:/app
      - avatar-node-modules:/app/node_modules

  admin:
    <<: *shared
    build:
      context: ./frontend/admin
      dockerfile: Dockerfile.dev
    ports:
      - "${PORT:-8786}:80"
      - "${HTTPS_PORT:-8787}:443"
    volumes:
      - ./frontend/admin:/app
      - admin-node-modules:/app/node_modules
      - ./frontend/admin/nginx/default.conf:/etc/nginx/http.d/default.conf:ro
      - ./frontend/admin/nginx/proxy-params.conf:/etc/nginx/http.d/proxy-params.conf:ro
      - ./frontend/admin/nginx/websocket.conf:/etc/nginx/http.d/websocket.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs
      - ./frontend/app/dist/embed:/srv/openvman/embed:ro
      - ./frontend/embed-loader/dist:/srv/openvman/embed-loader:ro
      - ./contracts:/contracts:ro
    depends_on:
      - api
      - backend
      - avatar

  redis:
    <<: *shared
    image: redis:7-alpine
    volumes:
      - redis-data:/data

  prometheus:
    <<: *shared
    image: prom/prometheus:v2.52.0
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d

  grafana:
    <<: *shared
    image: grafana/grafana:10.4.2
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/etc/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    depends_on:
      - prometheus

  backend:
    <<: *shared
    user: "${UID:-1000}:${GID:-1000}"
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend/app:/app/app
      - ./backend/data:/app/data
      - ./backend/logs:/app/logs
      - ./backend/tests:/app/tests
      - ./backend/Dockerfile:/app/Dockerfile
      - ./backend/requirements.txt:/app/requirements.txt
      - ./backend/scripts:/app/scripts
      - ./data/avatar:/data/avatar
      - ./data/backgrounds:/data/backgrounds
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - TTS_INDEXTTS_URL=http://index-tts-vllm:8011
      - AVATAR_ASSETS_DIR=/data/avatar
      - AVATAR_BACKGROUNDS_DIR=/data/backgrounds
    depends_on:
      api:
        condition: service_started

volumes:
  hf-cache:
  opf-cache:
  triton-cache:
  admin-node-modules:
  avatar-node-modules:
  redis-data:
  prometheus-data:
  grafana-data:
