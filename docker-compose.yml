  #     - VIBEVOICE_DEFAULT_SPEAKER=${VIBEVOICE_DEFAULT_SPEAKER:-0}
  #     - HF_TOKEN=${HF_TOKEN:-}
  #   volumes:
  #     - ./backend/vibevoice-serve/app:/app
