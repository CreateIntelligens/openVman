x-shared: &shared
  environment: &tz
    - TZ=Asia/Taipei
  restart: unless-stopped

services:
  api:
    <<: *shared
    user: "${UID:-1000}:${GID:-1000}"
    build:
      context: ./brain/api
      dockerfile: Dockerfile
    volumes:
      - ./brain/api:/app
      - ./brain/data:/data
      - ./brain/skills:/skills
      - ./contracts:/contracts:ro
      - brain-data:/home/appuser/.openclaw/lancedb
      - hf-cache:/home/appuser/.cache/huggingface
    env_file:
      - ./brain/.env
    environment:
      - HOME=/home/appuser
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  docling-serve:
    <<: *shared
    image: quay.io/ds4sd/docling-serve-cpu
    environment:
      - HOME=/tmp
    ports:
      - "5001:5001"

  admin:
    <<: *shared
    build:
      context: ./frontend/admin
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8787}:80"
    volumes:
      - ./frontend/admin:/app
      - admin-node-modules:/app/node_modules
      - ./frontend/admin/nginx:/etc/nginx/http.d
      - ./contracts:/contracts:ro
    depends_on:
      - api
      - backend
      - docling-serve

  backend:
    <<: *shared
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend/app:/app/app
      - ./backend/index-tts-vllm:/app/index-tts-vllm
      - ./backend/logs:/app/logs
      - hf-cache:/root/.cache/huggingface
      - modelscope-cache:/root/.cache/modelscope
    env_file:
      - ./backend/.env
    environment:
      - TORCH_CUDA_ARCH_LIST=8.6;8.9
    ports:
      - "${BACKEND_PORT:-8200}:8200"
    depends_on:
      - api
      - docling-serve
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  brain-data:
  hf-cache:
  modelscope-cache:
  admin-node-modules:
