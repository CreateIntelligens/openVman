x-shared: &shared
  environment: &tz
    - TZ=Asia/Taipei
  restart: unless-stopped

services:
  api:
    <<: *shared
    build:
      context: ./brain/api
      dockerfile: Dockerfile
    volumes:
      - ./brain/api:/app
      - ./brain/data:/data
      - ./brain/skills:/skills
      - ./contracts:/contracts:ro
      - brain-data:/root/.openclaw/lancedb
      - hf-cache:/root/.cache/huggingface
    env_file:
      - ./brain/.env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  admin:
    <<: *shared
    build:
      context: ./frontend/admin
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8787}:80"
    volumes:
      - ./frontend/admin:/app
      - admin-node-modules:/app/node_modules
      - ./frontend/admin/nginx:/etc/nginx/conf.d
      - ./contracts:/contracts:ro
    depends_on:
      - api
      - backend

  backend:
    <<: *shared
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend/app:/app/app
      - ./backend/index-tts-vllm:/app/index-tts-vllm
      - ./backend/logs:/app/logs
      - hf-cache:/root/.cache/huggingface
      - modelscope-cache:/root/.cache/modelscope
    env_file:
      - ./backend/.env
    ports:
      - "${BACKEND_PORT:-8200}:8200"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  brain-data:
  hf-cache:
  modelscope-cache:
  admin-node-modules:
