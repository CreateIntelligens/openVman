x-shared: &shared
  environment: &tz
    - TZ=Asia/Taipei
  restart: unless-stopped

services:
  api:
    <<: *shared
    user: "${UID:-1000}:${GID:-1000}"
    build:
      context: ./brain/api
      dockerfile: Dockerfile
    volumes:
      - ./brain/api:/app
      - ./brain/data:/data
      - ./brain/skills:/skills
      - ./contracts:/contracts:ro
      - brain-data:/home/appuser/.openclaw/lancedb
      - hf-cache:/home/appuser/.cache/huggingface
    env_file:
      - ./brain/.env
    environment:
      - HOME=/home/appuser
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  docling-serve:
    <<: *shared
    image: ghcr.io/docling-project/docling-serve-cpu:main
    environment:
      - HOME=/tmp
    ports:
      - "5001:5001"

  vibevoice-serve:
    <<: *shared
    build:
      context: ./backend/vibevoice-serve
      dockerfile: Dockerfile
    environment:
      - VIBEVOICE_ENABLED_MODELS=${VIBEVOICE_ENABLED_MODELS:-0.5b}
      - VIBEVOICE_DEFAULT_MODEL=${VIBEVOICE_DEFAULT_MODEL:-0.5b}
    volumes:
      - ./backend/vibevoice-serve/app:/app
      - ./backend/app/assets/tts_references:/app/assets/tts_references:ro
      - hf-cache:/root/.cache/huggingface
    ports:
      - "3000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  admin:
    <<: *shared
    build:
      context: ./frontend/admin
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8787}:80"
    volumes:
      - ./frontend/admin:/app
      - admin-node-modules:/app/node_modules
      - ./frontend/admin/nginx:/etc/nginx/http.d
      - ./contracts:/contracts:ro
    depends_on:
      - api
      - backend
      - docling-serve
      - vibevoice-serve

  redis:
    <<: *shared
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  backend:
    <<: *shared
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend/app:/app/app
      - ./backend/logs:/app/logs
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - TTS_VIBEVOICE_URL=http://vibevoice-serve:3000
    ports:
      - "${BACKEND_PORT:-8200}:8200"
    depends_on:
      - api
      - docling-serve
      - vibevoice-serve

volumes:
  brain-data:
  hf-cache:
  modelscope-cache:
  admin-node-modules:
  redis-data:
