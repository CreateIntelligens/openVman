services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    volumes:
      - ./api:/app
      - ./data:/data
      - ../contracts:/contracts:ro
      - brain-data:/root/.openclaw/lancedb
      - hf-cache:/root/.cache/huggingface
    env_file:
      - .env
    environment:
      - TZ=Asia/Taipei
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped


volumes:
  brain-data:
  hf-cache:
